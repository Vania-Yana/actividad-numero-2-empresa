<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empresa de Servicios</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body style="background-color:#f5f5f5;">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-lg">
    <div class="container">

        <!-- Logo / Nombre -->
        <a class="navbar-brand fw-bold fs-3 text-warning" href="/">
             Mi Empresa de Soporte tecnico innovasys
        </a>

        <!-- Botones -->
        <div>
            <a class="btn btn-warning me-2 fw-bold px-4" href="/">Inicio</a>
            <a class="btn btn-dark fw-bold px-4" href="/contacto">Contacto</a>
        </div>

    </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-4">
    {% block contenido %}{% endblock %}
</div>

<!-- FOOTER -->
<footer class="mt-5">
    <div class="text-center text-white p-4" style="background: linear-gradient(90deg, #d00000, #ffba08);">
        <h5 class="fw-bold">Mi Empresa de Servicios</h5>
        <p>Soluciones tecnológicas rápidas y confiables</p>
        <small>© 2026 - Todos los derechos reservados</small>
    </div>
</footer>

<!-- JS Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
